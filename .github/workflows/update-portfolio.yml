name: Update portfolio data

on:
  schedule:
    # Daily at 12:00 UTC
    - cron: "0 12 * * *"
  workflow_dispatch:
  push:
    paths:
      - "scripts/update_portfolio.py"
      - ".github/workflows/update-portfolio.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch GitHub repos and YouTube videos
        run: python scripts/update_portfolio.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/portfolio.json data/portfolio.js
          if git diff --staged --quiet; then
            echo "No portfolio data changes."
            exit 0
          fi
          git commit -m "chore: refresh portfolio data from GitHub and YouTube"
          git push
